services:

  mysql:
    image: mysql:8.0
    container_name: db_lokalmarket
    restart: unless-stopped
    ports:
      - "3400:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql